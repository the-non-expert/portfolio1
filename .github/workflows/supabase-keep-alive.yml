name: Supabase Keep Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ivyzanmdxjpoxohmatml.supabase.co/rest/v1/" \
            -H "apikey: sb_publishable_l7r7Sqw60x0mUOyjsDIoag_He47pOju" \
            -H "Authorization: Bearer sb_publishable_l7r7Sqw60x0mUOyjsDIoag_He47pOju")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive."
