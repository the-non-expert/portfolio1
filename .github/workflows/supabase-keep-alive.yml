name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping or restore Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="ivyzanmdxjpoxohmatml"
          ANON_KEY="sb_publishable_l7r7Sqw60x0mUOyjsDIoag_He47pOju"
          URL="https://${PROJECT_REF}.supabase.co/rest/v1/contacts?limit=1"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$URL" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY") || STATUS="000"

          echo "Ping status: $STATUS"

          if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 500 ]; then
            echo "Project is paused or unreachable. Restoring..."
            curl -s -X POST \
              "https://api.supabase.com/v1/projects/${PROJECT_REF}/restore" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json"
            echo "Restore triggered. Waiting 60s..."
            sleep 60
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$URL" \
              -H "apikey: $ANON_KEY" \
              -H "Authorization: Bearer $ANON_KEY") || STATUS="000"
            echo "Status after restore: $STATUS"
            if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 500 ]; then
              echo "Project still unreachable after restore attempt."
              exit 1
            fi
          fi

          echo "Supabase is alive."
