# No [build] block — Netlify auto-detects the SvelteKit build command and
# publish directory correctly. Overriding it breaks the deploy.

# www → non-www (belt-and-suspenders alongside _redirects)
[[redirects]]
  from   = "https://www.ayushjhunjhunwala.com/*"
  to     = "https://ayushjhunjhunwala.com/:splat"
  status = 301
  force  = true

# Note: the ayush-staging.netlify.app → ayushjhunjhunwala.com redirect is
# handled via Netlify Dashboard > Domain Management > Primary domain setting.
# Do NOT add it here — Netlify rejects redirects that point away from the
# site's own Netlify subdomain, which also breaks PR deploy previews.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
