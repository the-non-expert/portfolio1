# No [build] block — Netlify auto-detects the SvelteKit build command and
# publish directory correctly. Overriding it breaks the deploy.

# www → non-www (belt-and-suspenders alongside _redirects)
[[redirects]]
  from   = "https://www.ayushjhunjhunwala.com/*"
  to     = "https://ayushjhunjhunwala.com/:splat"
  status = 301
  force  = true

# Note: the ayush-staging.netlify.app → ayushjhunjhunwala.com redirect is
# handled via Netlify Dashboard > Domain Management > Primary domain setting.
# Do NOT add it here — Netlify rejects redirects that point away from the
# site's own Netlify subdomain, which also breaks PR deploy previews.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://challenges.cloudflare.com; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://challenges.cloudflare.com; img-src 'self' data: https://cdn.simpleicons.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self';"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' data: https:; frame-src 'self' https:; object-src 'none';"
