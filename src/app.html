<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Preconnect to external domains for performance -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
	<script>
		// Persist dark mode across reloads; toggle with T key
		(function() {
			if (localStorage.getItem('theme') === 'dark') {
				document.documentElement.classList.add('dark');
			}
		})();
	</script>

		<!-- Fallback meta — page-specific SEO is injected via %sveltekit.head% -->
		<meta name="description" content="Ayush Jhunjhunwala - Full-Stack Developer & Tech Enthusiast specializing in Python FastAPI backends, SvelteKit frontends, and AWS deployments." />
		<meta name="author" content="Ayush Jhunjhunwala" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#161412" />
		<meta name="msapplication-TileColor" content="#161412" />

<!-- Google Analytics -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-SE2HMESGZE"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			gtag('config', 'G-SE2HMESGZE');
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
