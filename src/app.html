<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Preconnect to external domains for performance -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
	<script>
		// Persist dark mode across reloads; toggle with T key
		(function() {
			if (localStorage.getItem('theme') === 'dark') {
				document.documentElement.classList.add('dark');
			}
		})();
	</script>

		<!-- SEO Meta Tags - Will be overridden by page-specific SEO -->
		<meta name="description" content="Ayush Jhunjhunwala - Full-Stack Developer & Tech Enthusiast specializing in Python FastAPI backends, SvelteKit frontends, and AWS deployments." />
		<meta name="keywords" content="Full Stack Developer Python FastAPI, SvelteKit Python Developer India, Tech Lead Full Stack Developer, AWS CI CD Python Developer, Full Stack Developer Leadership Experience, Python FastAPI SvelteKit Expert, Ayush Jhunjhunwala" />
		<meta name="author" content="Ayush Jhunjhunwala" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Ayush Jhunjhunwala - Full-Stack Developer & Tech Enthusiast" />
		<meta property="og:description" content="Tech leader and full-stack developer building scalable Python FastAPI backends, responsive SvelteKit frontends, and AWS-deployed systems." />
		<meta property="og:image" content="https://ayushjhunjhunwala.com/images/Ayushjhunjhunwala.png" />
		<meta property="og:url" content="https://ayushjhunjhunwala.com" />
		<meta property="og:site_name" content="Ayush Jhunjhunwala Portfolio" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Ayush Jhunjhunwala - Full-Stack Developer & Tech Enthusiast" />
		<meta name="twitter:description" content="Tech leader building scalable Python FastAPI backends, SvelteKit frontends & AWS deployments." />
		<meta name="twitter:image" content="https://ayushjhunjhunwala.com/images/Ayushjhunjhunwala.png" />
		<meta name="twitter:creator" content="@ayush_jhunjhunwala" />

		<!-- Additional Meta Tags -->
		<meta name="theme-color" content="#161412" />
		<meta name="msapplication-TileColor" content="#161412" />
		<link rel="canonical" href="https://ayushjhunjhunwala.com" />

<!-- Google Analytics -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-SE2HMESGZE"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			gtag('config', 'G-SE2HMESGZE');
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
