<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Preconnect to external domains for performance -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
	<script>
		// Persist dark mode across reloads; toggle with T key
		(function() {
			if (localStorage.getItem('theme') === 'dark') {
				document.documentElement.classList.add('dark');
			}
		})();
	</script>

		<!-- SEO Meta Tags - Will be overridden by page-specific SEO -->
		<meta name="description" content="Ayush Jhunjhunwala - Full-Stack Developer & Tech Enthusiast specializing in Python FastAPI backends, SvelteKit frontends, and AWS deployments." />
		<meta name="keywords" content="Full Stack Developer Python FastAPI, SvelteKit Python Developer India, Tech Lead Full Stack Developer, AWS CI CD Python Developer, Full Stack Developer Leadership Experience, Python FastAPI SvelteKit Expert, Ayush Jhunjhunwala" />
		<meta name="author" content="Ayush Jhunjhunwala" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Ayush Jhunjhunwala - Full-Stack Developer & Tech Enthusiast" />
		<meta property="og:description" content="Tech leader and full-stack developer building scalable Python FastAPI backends, responsive SvelteKit frontends, and AWS-deployed systems." />
